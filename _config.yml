title: Development Environments
description: A practical guide for data science students on setting up and maintaining a local development environment.
baseurl: "/managing-environments"
url: "https://uvads.github.io"
repository: uvads/managing-environments # for github-metadata

remote_theme: just-the-docs/just-the-docs@v0.8.2

permalink: pretty

exclude:
 # from https://github.com/jekyll/jekyll/blob/master/lib/site_template/_config.yml:
   - .sass-cache/
   - .jekyll-cache/
   - gemfiles/
   - Gemfile
   - Gemfile.lock
   - node_modules/
   - vendor/bundle/
   - vendor/cache/
   - vendor/gems/
   - vendor/ruby/
   - README.md
   - LICENSE.txt

# Set a path/url to a logo that will be displayed instead of the title
#logo: "/assets/images/just-the-docs.png"

# Enable or disable the site search
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 5
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false
  focus_shortcut_key: 'k'

# For copy button on code
enable_copy_code_button: true

# Mermaid diagrams (opt-in)
mermaid:
  version: "9.1.6"

# Enable or disable heading anchors
heading_anchors: true

# Aux links for the upper right navigation
aux_links:
  "UVA Data Science on GitHub":
    - "https://github.com/uvads/"

aux_links_new_tab: true

# Enable or disable the side/mobile menu globally
nav_enabled: true

# Sort order for navigation links
nav_sort: case_sensitive # Capital letters sorted before lowercase

liquid:
   error_mode: strict
   strict_filters: true

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"

footer_content: "Copyright &copy; 2026 The Rector and Visitors of the University of Virginia."

# Footer last edited timestamp
last_edit_timestamp: true
last_edit_time_format: "%Y-%m-%d %I:%M%p"

# Footer "Edit this page on GitHub" link text
gh_edit_link: true
gh_edit_link_text: "Edit this page on GitHub"
gh_edit_repository: "https://github.com/uvads/managing-environments"
gh_edit_branch: "main"
gh_edit_view_mode: "tree"

# Color scheme: "dark", "light"/nil (default), or a custom scheme
color_scheme: nil

callouts_level: quiet # or loud
callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  success:
    title: More
    color: green
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red

plugins:
  - jekyll-seo-tag
  - jekyll-github-metadata
  - jekyll-include-cache
  - jemoji

kramdown:
  syntax_highlighter_opts:
    block:
      line_numbers: false

compress_html:
  clippings: all
  comments: all
  endings: all
  startings: []
  blanklines: false
  profile: false
